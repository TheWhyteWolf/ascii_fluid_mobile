<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0c09">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ascii fluid // voyd</title>
<style>
  /* ===== bundled fonts (woff2, local) ===== */
  @font-face{font-family:'JetBrains Mono';src:url('fonts/jetbrains-mono.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'IBM Plex Mono';src:url('fonts/ibm-plex-mono.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'Space Mono';src:url('fonts/space-mono.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'Share Tech Mono';src:url('fonts/share-tech-mono.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'VT323';src:url('fonts/vt323.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'Major Mono Display';src:url('fonts/major-mono.woff2') format('woff2');font-weight:400;font-display:swap;}
  /* pixel CJK тАФ scoped so the big JP file only loads when kana/kanji are shown */
  @font-face{font-family:'DotGothic16';src:url('fonts/dotgothic16-jp.woff2') format('woff2');font-display:swap;
    unicode-range:U+3000-303F,U+3040-30FF,U+FF00-FFEF,U+4E00-9FFF,U+3400-4DBF;}
  @font-face{font-family:'DotGothic16';src:url('fonts/dotgothic16-latin.woff2') format('woff2');font-display:swap;
    unicode-range:U+0000-00FF,U+2000-206F;}

  :root{
    /* voyd defaults тАФ overwritten per-palette by applyUITheme() at runtime */
    --accent:#a4bf55; --accent-dim:#6c8a3a; --bg:#0a0c09; --txt:#c4cbb5;
    --line:rgba(164,191,85,.26); --line-soft:rgba(164,191,85,.10);
    --panel:rgba(10,12,9,.92); --btn-bg:#12160d;
    --on-accent:#0a0c09; --on-dim:#0a0c09; --glow:rgba(164,191,85,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none;}
  body{
    position:fixed; inset:0;
    background:var(--bg); color:var(--txt);
    font:14px/1.4 ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  #screen{ position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none;}

  #hint{
    position:fixed; top:calc(env(safe-area-inset-top) + 16px); left:0; right:0;
    text-align:center; color:var(--accent); font-size:12px; letter-spacing:.08em;
    text-shadow:0 1px 4px #000; pointer-events:none; transition:opacity .6s; z-index:5;
  }
  #hint.gone{ opacity:0;}

  #sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    background:var(--panel);
    border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 -10px 40px rgba(0,0,0,.5);
    padding-bottom:env(safe-area-inset-bottom);
  }
  #grab{ display:flex; justify-content:center; padding:9px 0 4px;}
  #grab::before{ content:""; width:42px; height:5px; border-radius:3px; background:var(--line);}

  #quick{ display:flex; gap:8px; align-items:center; padding:4px 12px 12px;}
  #quick .qbtn{
    flex:0 0 auto; min-width:46px; height:46px;
    display:flex; align-items:center; justify-content:center;
    background:var(--btn-bg); color:var(--accent);
    border:1px solid var(--line); border-radius:10px; font-size:18px;
  }
  #quick .qbtn:active{ background:var(--accent); color:var(--on-accent);}
  #quick .qbtn.wide{ flex:1; min-width:0; font-size:12px; letter-spacing:.12em; text-transform:uppercase; gap:6px;}
  #quick .qbtn.on{ background:var(--accent-dim); color:var(--on-dim);}

  #full{ max-height:0; overflow:hidden; transition:max-height .28s ease;}
  #sheet.open #full{ max-height:64vh; overflow-y:auto; overscroll-behavior:contain; touch-action:pan-y;}
  #full .inner{ padding:2px 16px 18px;}

  .grp{ margin-top:14px;}
  .grp > .lbl{
    color:var(--accent-dim); font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    display:block; margin:0 0 9px; padding-bottom:5px; border-bottom:1px dotted var(--line-soft);
  }
  .row{ display:flex; align-items:center; gap:10px; margin:13px 0;}
  .row label{ flex:0 0 96px; font-size:12px; opacity:.9;}
  .row .val{ flex:0 0 40px; text-align:right; color:var(--accent); font-size:12px;}
  input[type=range]{
    flex:1; height:6px; -webkit-appearance:none; appearance:none;
    background:var(--line); border-radius:3px; accent-color:var(--accent);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:24px; height:24px; border-radius:50%;
    background:var(--accent); border:0; box-shadow:0 0 8px var(--glow);
  }
  input[type=range]::-moz-range-thumb{ width:24px;height:24px;border:0;border-radius:50%;background:var(--accent);}
  select{
    flex:1; min-width:0; background:var(--btn-bg); color:var(--txt);
    border:1px solid var(--line); border-radius:8px;
    padding:11px 10px; font:inherit; font-size:13px;
  }
  .seg{ display:flex; flex:1; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .seg button{
    flex:1; background:var(--btn-bg); color:var(--txt); border:0; border-left:1px solid var(--line);
    padding:11px 4px; font:inherit; font-size:12px;
  }
  .seg button:first-child{ border-left:0;}
  .seg button.on{ background:var(--accent); color:var(--on-accent);}
  .toggles{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .tg{
    flex:1 1 calc(50% - 4px); min-height:46px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--btn-bg); color:var(--txt);
    border:1px solid var(--line); border-radius:10px; font-size:12px;
  }
  .tg.on{ background:var(--accent-dim); color:var(--on-dim); border-color:var(--accent);}
  .tg.disabled{ opacity:.35;}
</style>
</head>
<body>
<canvas id="screen"></canvas>
<div id="hint">tap&nbsp;┬╖&nbsp;shape&nbsp;&nbsp;&nbsp;drag&nbsp;┬╖&nbsp;stir&nbsp;&nbsp;&nbsp;multi-touch&nbsp;┬╖&nbsp;tilt&nbsp;┬╖&nbsp;gravity</div>

<div id="sheet">
  <div id="grab"></div>
  <div id="quick">
    <button class="qbtn" data-act="pause" id="qpause">тЭЪтЭЪ</button>
    <button class="qbtn" data-act="reseed">тЯ│</button>
    <button class="qbtn" data-act="clear">тМл</button>
    <button class="qbtn" data-act="gravity" id="qgrav" title="tilt / gravity">тПЪ</button>
    <button class="qbtn" data-act="fs">тЫ╢</button>
    <button class="qbtn wide" id="expand">controls&nbsp;<span id="chev">тЦ┤</span></button>
  </div>
  <div id="full"><div class="inner">

    <div class="grp">
      <span class="lbl">render</span>
      <div class="row"><label>field</label>
        <select id="field">
          <option value="dye">dye / ink</option>
          <option value="speed">speed</option>
          <option value="vort">vorticity</option>
        </select>
      </div>
      <div class="row"><label>palette</label><select id="theme"></select></div>
      <div class="row"><label>charset</label><select id="ramp"></select></div>
      <div class="row"><label>font</label><select id="font"></select></div>
      <div class="row"><label>distortion</label><select id="brush"></select></div>
      <div class="row"><label>spin</label>
        <div class="seg" id="spinSeg">
          <button data-spin="auto" class="on">auto</button>
          <button data-spin="cw">CW тЖ╗</button>
          <button data-spin="ccw">CCW тЖ║</button>
        </div>
      </div>
    </div>

    <div class="grp">
      <span class="lbl">flow</span>
      <div class="row"><label>speed</label><input type="range" id="speed" min="5" max="100"><span class="val" id="speedV"></span></div>
      <div class="row"><label>vorticity</label><input type="range" id="vort" min="0" max="100"><span class="val" id="vortV"></span></div>
      <div class="row"><label>viscosity</label><input type="range" id="visc" min="0" max="100"><span class="val" id="viscV"></span></div>
      <div class="row"><label>dye spread</label><input type="range" id="diff" min="0" max="100"><span class="val" id="diffV"></span></div>
      <div class="row"><label>persistence</label><input type="range" id="fade" min="90" max="100"><span class="val" id="fadeV"></span></div>
      <div class="row"><label>brush</label><input type="range" id="force" min="0" max="100"><span class="val" id="forceV"></span></div>
      <div class="row"><label>gravity</label><input type="range" id="grav" min="0" max="100"><span class="val" id="gravV"></span></div>
    </div>

    <div class="grp">
      <span class="lbl">look &amp; seed</span>
      <div class="row"><label>detail</label><input type="range" id="detail" min="8" max="22"><span class="val" id="detailV"></span></div>
      <div class="row"><label>contrast</label><input type="range" id="gamma" min="30" max="140"><span class="val" id="gammaV"></span></div>
      <div class="row"><label>seeds</label><input type="range" id="count" min="1" max="12"><span class="val" id="countV"></span></div>
      <div class="toggles">
        <button class="tg on" id="auto">autopilot</button>
        <button class="tg" id="invert">invert</button>
        <button class="tg disabled" id="spinColor">spin colors</button>
        <button class="tg" id="randomize">randomize тЪД</button>
        <button class="tg" id="reseed2">reseed</button>
      </div>
    </div>

  </div></div>
</div>

<script>
"use strict";

/* ===== 1. FLUID SOLVER (Stam stable-fluids + vorticity confinement) ===== */
class Fluid {
  constructor(nx,ny){ this.iters=16; this.visc=2e-5; this.diff=1e-5; this.eps=12; this.fade=0.992; this.resize(nx,ny); }
  resize(nx,ny){ this.nx=nx; this.ny=ny; this.w=nx+2; this.h=ny+2; this.size=this.w*this.h;
    const A=()=>new Float32Array(this.size);
    this.u=A();this.v=A();this.u0=A();this.v0=A();this.d=A();this.d0=A();
    this.uSrc=A();this.vSrc=A();this.dSrc=A();this.curl=A(); }
  IX(i,j){return i+this.w*j;}
  clearSources(){this.uSrc.fill(0);this.vSrc.fill(0);this.dSrc.fill(0);}
  clearAll(){this.u.fill(0);this.v.fill(0);this.d.fill(0);this.clearSources();}
  addSource(x,s,dt){for(let k=0;k<this.size;k++)x[k]+=dt*s[k];}
  setBnd(b,x){const{nx,ny}=this;
    for(let j=1;j<=ny;j++){x[this.IX(0,j)]=b===1?-x[this.IX(1,j)]:x[this.IX(1,j)];x[this.IX(nx+1,j)]=b===1?-x[this.IX(nx,j)]:x[this.IX(nx,j)];}
    for(let i=1;i<=nx;i++){x[this.IX(i,0)]=b===2?-x[this.IX(i,1)]:x[this.IX(i,1)];x[this.IX(i,ny+1)]=b===2?-x[this.IX(i,ny)]:x[this.IX(i,ny)];}
    x[this.IX(0,0)]=0.5*(x[this.IX(1,0)]+x[this.IX(0,1)]);x[this.IX(0,ny+1)]=0.5*(x[this.IX(1,ny+1)]+x[this.IX(0,ny)]);
    x[this.IX(nx+1,0)]=0.5*(x[this.IX(nx,0)]+x[this.IX(nx+1,1)]);x[this.IX(nx+1,ny+1)]=0.5*(x[this.IX(nx,ny+1)]+x[this.IX(nx+1,ny)]);}
  linSolve(b,x,x0,a,c){const{nx,ny,w}=this;const ic=1/c;
    for(let k=0;k<this.iters;k++){for(let j=1;j<=ny;j++)for(let i=1;i<=nx;i++){const d=this.IX(i,j);x[d]=(x0[d]+a*(x[d-1]+x[d+1]+x[d-w]+x[d+w]))*ic;}this.setBnd(b,x);}}
  diffuse(b,dst,src,diff,dt){const a=dt*diff*this.nx*this.ny;this.linSolve(b,dst,src,a,1+4*a);}
  advect(b,dst,src,vu,vv,dt){const{nx,ny}=this;const dx=dt*nx,dy=dt*ny;
    for(let j=1;j<=ny;j++)for(let i=1;i<=nx;i++){const d=this.IX(i,j);
      let x=i-dx*vu[d],y=j-dy*vv[d];
      if(x<0.5)x=0.5;if(x>nx+0.5)x=nx+0.5;if(y<0.5)y=0.5;if(y>ny+0.5)y=ny+0.5;
      const i0=x|0,i1=i0+1,j0=y|0,j1=j0+1,s1=x-i0,s0=1-s1,t1=y-j0,t0=1-t1;
      dst[d]=s0*(t0*src[this.IX(i0,j0)]+t1*src[this.IX(i0,j1)])+s1*(t0*src[this.IX(i1,j0)]+t1*src[this.IX(i1,j1)]);}
    this.setBnd(b,dst);}
  project(vu,vv,p,div){const{nx,ny,w}=this;const N=nx;
    for(let j=1;j<=ny;j++)for(let i=1;i<=nx;i++){const d=this.IX(i,j);div[d]=-0.5*(vu[d+1]-vu[d-1]+vv[d+w]-vv[d-w])/N;p[d]=0;}
    this.setBnd(0,div);this.setBnd(0,p);this.linSolve(0,p,div,1,4);
    for(let j=1;j<=ny;j++)for(let i=1;i<=nx;i++){const d=this.IX(i,j);vu[d]-=0.5*N*(p[d+1]-p[d-1]);vv[d]-=0.5*N*(p[d+w]-p[d-w]);}
    this.setBnd(1,vu);this.setBnd(2,vv);}
  vortConfine(dt,eps){if(eps<=0)return;const{nx,ny,curl,u,v,w}=this;
    for(let j=1;j<=ny;j++)for(let i=1;i<=nx;i++){const d=this.IX(i,j);curl[d]=0.5*((v[d+1]-v[d-1])-(u[d+w]-u[d-w]));}
    for(let j=2;j<ny;j++)for(let i=2;i<nx;i++){const d=this.IX(i,j);
      let nX=0.5*(Math.abs(curl[d+1])-Math.abs(curl[d-1])),nY=0.5*(Math.abs(curl[d+w])-Math.abs(curl[d-w]));
      const L=Math.hypot(nX,nY)+1e-5;nX/=L;nY/=L;const wz=curl[d];u[d]+=dt*eps*(nY*wz);v[d]+=dt*eps*(-nX*wz);}}
  computeCurl(){const{nx,ny,curl,u,v,w}=this;for(let j=1;j<=ny;j++)for(let i=1;i<=nx;i++){const d=this.IX(i,j);curl[d]=0.5*((v[d+1]-v[d-1])-(u[d+w]-u[d-w]));}}
  velStep(dt){this.addSource(this.u,this.uSrc,dt);this.addSource(this.v,this.vSrc,dt);this.vortConfine(dt,this.eps);
    this.diffuse(1,this.u0,this.u,this.visc,dt);this.diffuse(2,this.v0,this.v,this.visc,dt);
    this.project(this.u0,this.v0,this.u,this.v);
    this.advect(1,this.u,this.u0,this.u0,this.v0,dt);this.advect(2,this.v,this.v0,this.u0,this.v0,dt);
    this.project(this.u,this.v,this.u0,this.v0);}
  densStep(dt){this.addSource(this.d,this.dSrc,dt);this.diffuse(0,this.d0,this.d,this.diff,dt);
    this.advect(0,this.d,this.d0,this.u,this.v,dt);const f=this.fade;for(let k=0;k<this.size;k++)this.d[k]*=f;}
  step(dt){this.velStep(dt);this.densStep(dt);if(this.eps<=0)this.computeCurl();this.clearSources();}

  /* uniform body force (gravity / tilt) тАФ added into the velocity sources this step */
  addUniform(ax,ay){const{nx,ny,w}=this;for(let j=1;j<=ny;j++){const b=j*w;for(let i=1;i<=nx;i++){const d=b+i;this.uSrc[d]+=ax;this.vSrc[d]+=ay;}}}

  /* ---- distortion injectors (all write velocity + dye directly) ---- */
  splatVortex(cx,cy,strength,radius,dye){const{nx,ny}=this;const r2=radius*radius;const rad=Math.ceil(radius*3);
    const ci=Math.round(cx),cj=Math.round(cy);
    for(let dj=-rad;dj<=rad;dj++)for(let di=-rad;di<=rad;di++){const i=ci+di,j=cj+dj;
      if(i<1||i>nx||j<1||j>ny)continue;const f=Math.exp(-(di*di+dj*dj)/(2*r2));const d=this.IX(i,j);
      this.u[d]+=-dj*strength*f;this.v[d]+=di*strength*f;this.d[d]+=dye*f;}}
  splatBurst(cx,cy,strength,radius,dye){const{nx,ny}=this;const r2=radius*radius;const rad=Math.ceil(radius*3);
    const ci=Math.round(cx),cj=Math.round(cy);
    for(let dj=-rad;dj<=rad;dj++)for(let di=-rad;di<=rad;di++){const i=ci+di,j=cj+dj;
      if(i<1||i>nx||j<1||j>ny)continue;const r=Math.hypot(di,dj)||1;const f=Math.exp(-(di*di+dj*dj)/(2*r2));const d=this.IX(i,j);
      this.u[d]+=(di/r)*strength*f;this.v[d]+=(dj/r)*strength*f;this.d[d]+=dye*f;}}
  splatJet(cx,cy,dx,dy,strength,radius,dye){const{nx,ny}=this;const r2=radius*radius;const rad=Math.ceil(radius*3);
    const L=Math.hypot(dx,dy)||1;dx/=L;dy/=L;const ci=Math.round(cx),cj=Math.round(cy);
    for(let dj=-rad;dj<=rad;dj++)for(let di=-rad;di<=rad;di++){const i=ci+di,j=cj+dj;
      if(i<1||i>nx||j<1||j>ny)continue;const f=Math.exp(-(di*di+dj*dj)/(2*r2));const d=this.IX(i,j);
      this.u[d]+=dx*strength*f;this.v[d]+=dy*strength*f;this.d[d]+=dye*f;}}
  splatDipole(cx,cy,dx,dy,strength,radius,dye){const L=Math.hypot(dx,dy)||1;dx/=L;dy/=L;
    const px=-dy,py=dx,off=radius*0.6;           // two counter-rotating cores propel a ring along (dx,dy)
    this.splatVortex(cx+px*off,cy+py*off, strength,radius*0.8,dye*0.55);
    this.splatVortex(cx-px*off,cy-py*off,-strength,radius*0.8,dye*0.55);
    this.splatJet(cx,cy,dx,dy,strength*0.6,radius*0.7,dye*0.4);}
  splatShock(cx,cy,strength,radius,dye){const{nx,ny}=this;const rad=Math.ceil(radius*2);const shell=radius*0.5;const ring=radius*0.6;
    const ci=Math.round(cx),cj=Math.round(cy);
    for(let dj=-rad;dj<=rad;dj++)for(let di=-rad;di<=rad;di++){const i=ci+di,j=cj+dj;
      if(i<1||i>nx||j<1||j>ny)continue;const r=Math.hypot(di,dj)||1;
      const f=Math.exp(-((r-ring)*(r-ring))/(2*shell*shell));const d=this.IX(i,j);
      this.u[d]+=(di/r)*strength*f;this.v[d]+=(dj/r)*strength*f;this.d[d]+=dye*f*0.8;}}
  splatTurb(cx,cy,strength,radius,dye){for(let k=0;k<6;k++){const a=Math.random()*Math.PI*2,rr=Math.random()*radius;
    const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
    this.splatVortex(x,y,(Math.random()<0.5?-1:1)*strength*(0.5+Math.random()),radius*0.35,dye*0.5);}}
  splatBloom(cx,cy,radius,dye){const{nx,ny}=this;const r2=radius*radius;const rad=Math.ceil(radius*3);
    const ci=Math.round(cx),cj=Math.round(cy);
    for(let dj=-rad;dj<=rad;dj++)for(let di=-rad;di<=rad;di++){const i=ci+di,j=cj+dj;
      if(i<1||i>nx||j<1||j>ny)continue;const f=Math.exp(-(di*di+dj*dj)/(2*r2));this.d[this.IX(i,j)]+=dye*f;}}
  splatShear(cx,cy,dx,dy,strength,radius,dye){const{nx,ny}=this;const r2=radius*radius;const rad=Math.ceil(radius*3);
    const L=Math.hypot(dx,dy)||1;dx/=L;dy/=L;const px=-dy,py=dx;const ci=Math.round(cx),cj=Math.round(cy);
    for(let dj=-rad;dj<=rad;dj++)for(let di=-rad;di<=rad;di++){const i=ci+di,j=cj+dj;
      if(i<1||i>nx||j<1||j>ny)continue;const f=Math.exp(-(di*di+dj*dj)/(2*r2));const d=this.IX(i,j);
      const s=(di*px+dj*py)>=0?1:-1;               // opposite drift either side of the axis -> rolls up
      this.u[d]+=dx*strength*s*f;this.v[d]+=dy*strength*s*f;this.d[d]+=dye*f;}}

  addForce(i,j,fx,fy,dye,brush){const{nx,ny}=this;
    for(let dj=-brush;dj<=brush;dj++)for(let di=-brush;di<=brush;di++){const x=i+di,y=j+dj;
      if(x<1||x>nx||y<1||y>ny)continue;const f=Math.exp(-(di*di+dj*dj)/(2*brush*brush+0.1));const d=this.IX(x,y);
      this.uSrc[d]+=fx*f;this.vSrc[d]+=fy*f;this.dSrc[d]+=dye*f;}}
}

/* ===== 2. PALETTES ===== */
/* built-in signature + classic palettes (normalized to {name,group,bg,bands,accent,stops}) */

function lerpStops(s,t){if(t<=s[0][0])return s[0][1];if(t>=s[s.length-1][0])return s[s.length-1][1];
  for(let k=0;k<s.length-1;k++){const a=s[k],b=s[k+1];if(t>=a[0]&&t<=b[0]){const f=(t-a[0])/(b[0]-a[0]);
    return[a[1][0]+(b[1][0]-a[1][0])*f,a[1][1]+(b[1][1]-a[1][1])*f,a[1][2]+(b[1][2]-a[1][2])*f];}}return s[s.length-1][1];}
function buildLUT(stops,signed,bands){const lut=new Array(256);for(let k=0;k<256;k++){let t=signed?(k/255)*2-1:k/255;
  if(!signed&&bands&&bands>1){t=Math.round(t*(bands-1))/(bands-1);}       // hard-quantize into flat colour bands
  const c=lerpStops(stops,t);lut[k]=`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;}return lut;}

/* ---- derive a full, legible UI palette from the active fluid theme ---- */
function hexRGB(h){ h=h.replace('#',''); if(h.length===3)h=h.replace(/(.)/g,'$1$1');
  const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function mix(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
function rgbCss(c){ return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }
function rgbaCss(c,a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }
/* WCAG relative luminance */
function relLum(c){ const f=x=>{ x/=255; return x<=0.03928? x/12.92 : Math.pow((x+0.055)/1.055,2.4); };
  return 0.2126*f(c[0])+0.7152*f(c[1])+0.0722*f(c[2]); }
/* lighten toward white until luminance clears a floor тАФ keeps dim accents readable on the dark panel */
function raiseLum(c,minL){ let o=c; for(let k=0;k<40 && relLum(o)<minL;k++) o=mix(o,[255,255,255],0.08); return o; }
/* max-contrast ink for text sitting on `bg`: the palette's near-black, or near-white */
function inkOn(bg,dark){ return relLum(bg)>0.179 ? dark : [240,240,236]; }

function applyUITheme(theme){
  const bg=hexRGB(theme.bg);
  const accent=theme.accent||theme.stops[theme.stops.length-2][1];
  const dim=raiseLum(mix(accent,bg,0.40),0.22);   // muted accent, floored to stay legible on the panel
  const txt=mix(accent,[255,255,255],0.72);        // light, on-theme body text
  const btn=mix(bg,accent,0.09);                   // dark control fill with a hint of the hue
  const R=document.documentElement.style;
  R.setProperty('--accent',rgbCss(accent));
  R.setProperty('--accent-dim',rgbCss(dim));
  R.setProperty('--bg',rgbCss(bg));
  R.setProperty('--txt',rgbCss(txt));
  R.setProperty('--btn-bg',rgbCss(btn));
  R.setProperty('--panel',rgbaCss(bg,0.92));
  R.setProperty('--line',rgbaCss(accent,0.26));
  R.setProperty('--line-soft',rgbaCss(accent,0.10));
  R.setProperty('--glow',rgbaCss(accent,0.5));
  R.setProperty('--on-accent',rgbCss(inkOn(accent,bg)));
  R.setProperty('--on-dim',rgbCss(inkOn(dim,bg)));
}

function rebuildColors(){
  const th=THEMES[state.theme];
  bgColor=th.bg;
  applyUITheme(th);
  const useSpin=state.spinColor && state.field==='vort';
  lut=useSpin?buildLUT(SPIN_STOPS,true,0):buildLUT(th.stops,false,th.bands||0);
  document.body.style.background=bgColor;
  document.querySelector('meta[name=theme-color]').setAttribute('content',bgColor);
}

/* pick a cell size that keeps the grid within a smooth budget for phones */
function defaultCell(W,H){
  const budget=4800;
  let c=11;
  while(Math.floor(W/c)*Math.floor(H/c)>budget && c<22) c++;
  while(Math.floor(W/c)*Math.floor(H/c)<1500 && c>8) c--;
  return Math.max(8,Math.min(22,c));
}

function layout(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  const W=window.innerWidth,H=window.innerHeight;
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cell=state.detail;
  cols=Math.max(10,Math.floor(W/cell));
  rows=Math.max(10,Math.floor(H/cell));
  offX=(W-cols*cell)/2; offY=(H-rows*cell)/2;
  if(!fluid){ fluid=new Fluid(cols,rows); applyParams(); reseed(); }
  else if(fluid.nx!==cols||fluid.ny!==rows){ fluid.resize(cols,rows); applyParams(); reseed(); }
}

/* ---- brush dispatch: turn a point into the selected distortion ---- */
function brushDir(){ const a=Math.random()*Math.PI*2; return {x:Math.cos(a),y:Math.sin(a)}; }
function applyBrush(kind,i,j,spin,scale){
  scale=scale||1;
  const rad=Math.min(Math.max(Math.min(cols,rows)*0.07,3),11)*scale;
  const S=1.15*scale, dye=1.2, f=fluid;
  switch(kind){
    case 'burst':      f.splatBurst(i,j, S*0.9, rad, dye); break;
    case 'implode':    f.splatBurst(i,j,-S*0.9, rad, dye*0.6); break;
    case 'jet':      { const d=brushDir(); f.splatJet(i,j,d.x,d.y, S*1.4, rad, dye); break; }
    case 'dipole':   { const d=brushDir(); f.splatDipole(i,j,d.x,d.y, S*1.2, rad, dye); break; }
    case 'shock':      f.splatShock(i,j, S*1.3, rad*1.4, dye); break;
    case 'turbulence': f.splatTurb(i,j, S, rad*1.3, dye*0.8); break;
    case 'bloom':      f.splatBloom(i,j, rad*1.15, dye*1.3); break;
    case 'shear':    { const d=brushDir(); f.splatShear(i,j,d.x,d.y, S*1.1, rad*1.2, dye); break; }
    case 'vortex':
    default:           f.splatVortex(i,j, spin*S, rad, dye);
  }
}

function reseed(){
  fluid.clearAll(); runMax=1e-3;
  const n=state.count;
  for(let k=0;k<n;k++){
    const a=(k/n)*Math.PI*2, jit=(Math.random()*2-1);
    const cx=cols*(0.5+0.36*Math.cos(a))+jit*cols*0.05;
    const cy=rows*(0.5+0.36*Math.sin(a))+jit*rows*0.05;
    applyBrush(state.brush, cx, cy, (k%2?-1:1), 1);
  }
}

function scanMax(){
  const f=fluid,W=f.w; let m=1e-4;
  if(state.field==='dye'){
    for(let j=1;j<=rows;j++){const b=j*W;for(let i=1;i<=cols;i++){const x=f.d[b+i];if(x>m)m=x;}}
  } else if(state.field==='speed'){
    for(let j=1;j<=rows;j++){const b=j*W;for(let i=1;i<=cols;i++){const d=b+i;const s=Math.abs(f.u[d])+Math.abs(f.v[d]);if(s>m)m=s;}}
  } else {
    for(let j=1;j<=rows;j++){const b=j*W;for(let i=1;i<=cols;i++){const s=Math.abs(f.curl[b+i]);if(s>m)m=s;}}
  }
  runMax=Math.max(m,runMax*0.94,1e-4);
}

function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=bgColor; ctx.fillRect(0,0,cv.width,cv.height);
  const f=fluid,W=f.w;
  const R=RAMPS[state.ramp], ramp=R.chars, rmax=ramp.length-1;
  const inv=state.invert, gamma=state.gamma;
  const useSpin=state.spinColor && state.field==='vort';
  const fld=state.field, inorm=1/runMax;
  const fpx=Math.max(6,Math.round(cell*(R.cjk?1.02:1.35)));
  ctx.font=fpx+'px '+fontFamily();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const half=cell*0.5; let cur='';
  for(let j=1;j<=rows;j++){
    const cy=offY+(j-1)*cell+half, base=j*W;
    for(let i=1;i<=cols;i++){
      const d=base+i; let raw, signed=0;
      if(fld==='dye') raw=f.d[d];
      else if(fld==='speed') raw=Math.abs(f.u[d])+Math.abs(f.v[d]);
      else { signed=f.curl[d]; raw=Math.abs(signed); }
      let v=raw*inorm; if(v>1)v=1; else if(v<0)v=0; v=Math.pow(v,gamma);
      const vv=inv?1-v:v;
      const ch=ramp[(vv*rmax)|0];
      if(ch===' '||ch==='уАА') continue;
      let li;
      if(useSpin){ let s=signed*inorm; if(s>1)s=1; else if(s<-1)s=-1;
        const mag=Math.pow(Math.abs(s),gamma)*Math.sign(s); li=((mag*0.5+0.5)*255)|0; }
      else li=(vv*255)|0;
      if(li<0)li=0; else if(li>255)li=255;
      const st=lut[li]; if(st!==cur){ctx.fillStyle=st;cur=st;}
      ctx.fillText(ch, offX+(i-1)*cell+half, cy);
    }
  }
}

/* ===== 4. TOUCH INTERACTION тАФ multi-touch (tap = distortion, drag = stir) ===== */
const pointers=new Map();
const MOVE_THRESH=10;
function toCell(px,py){
  return {
    i: Math.min(cols,Math.max(1,Math.floor((px-offX)/cell)+1)),
    j: Math.min(rows,Math.max(1,Math.floor((py-offY)/cell)+1)),
  };
}
function nextSpin(){
  if(state.spinMode==='cw') return 1;
  if(state.spinMode==='ccw') return -1;
  const s=parity.s; parity.s*=-1; return s;
}
cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId);
  const c=toCell(e.clientX,e.clientY);
  pointers.set(e.pointerId,{downXY:{x:e.clientX,y:e.clientY}, downCell:c, lastCell:c, moved:false});
  dismissHint();
});
cv.addEventListener('pointermove',e=>{
  const p=pointers.get(e.pointerId); if(!p) return;
  if(!p.moved && Math.abs(e.clientX-p.downXY.x)+Math.abs(e.clientY-p.downXY.y)>MOVE_THRESH) p.moved=true;
  if(p.moved){
    const c=toCell(e.clientX,e.clientY);
    const di=c.i-p.lastCell.i, dj=c.j-p.lastCell.j, fs=forceScale();
    fluid.addForce(c.i,c.j, di*fs, dj*fs, 16, 2);
    p.lastCell=c;
  }
});
function endPtr(e){
  const p=pointers.get(e.pointerId); if(!p) return;
  pointers.delete(e.pointerId);
  if(!p.moved){ applyBrush(state.brush, p.downCell.i, p.downCell.j, nextSpin(), 1); }
}
cv.addEventListener('pointerup',endPtr);
cv.addEventListener('pointercancel',endPtr);

/* ===== 4b. GRAVITY / TILT ===== */
let gvx=0, gvy=0, gBaseBeta=null, gBaseGamma=null;
const GRAV=4;                                 // base body-force scale
function onOrient(e){
  if(e.beta==null||e.gamma==null) return;
  if(gBaseBeta==null){ gBaseBeta=e.beta; gBaseGamma=e.gamma; }  // calibrate to the pose gravity was enabled in
  let db=e.beta-gBaseBeta, dg=e.gamma-gBaseGamma;
  if(db>180)db-=360; else if(db<-180)db+=360;
  let gx=Math.sin(dg*Math.PI/180), gy=Math.sin(db*Math.PI/180); // downhill direction in the device frame
  const ang=((screen.orientation&&screen.orientation.angle)||window.orientation||0)*Math.PI/180;
  const ca=Math.cos(ang), sa=Math.sin(ang);   // rotate device axes into the (possibly rotated) screen frame
  gvx=gx*ca + gy*sa;
  gvy=-gx*sa + gy*ca;
}
function addOrient(){ window.addEventListener('deviceorientation',onOrient,true); }
function removeOrient(){ window.removeEventListener('deviceorientation',onOrient,true); gvx=gvy=0; gBaseBeta=gBaseGamma=null; }
function enableGravity(){
  const D=window.DeviceOrientationEvent;
  if(D && typeof D.requestPermission==='function'){   // iOS 13+ gated behind a user gesture
    D.requestPermission().then(s=>{ if(s==='granted') addOrient(); else setGravity(false); }).catch(()=>setGravity(false));
  } else { addOrient(); }
}
function setGravity(on){
  state.gravity=on;
  const b=$('qgrav'); if(b) b.classList.toggle('on',on);
  if(on){ gBaseBeta=gBaseGamma=null; enableGravity(); } else { removeOrient(); }
}

/* ===== 5. AUTOPILOT ===== */
let autoAcc=0;
function autopilot(realDt){
  if(!state.auto||state.paused) return;
  autoAcc+=realDt;
  if(autoAcc>=2.2){
    autoAcc=0;
    const cx=2+Math.random()*(cols-4), cy=2+Math.random()*(rows-4);
    applyBrush(state.brush, cx, cy, (Math.random()<0.5?-1:1), 0.7);
  }
}

/* ===== 6. MAIN LOOP (~30fps, machine-independent + battery friendly) ===== */
let last=performance.now(), acc=0;
const STEP=1000/30;
function frame(now){
  requestAnimationFrame(frame);
  const el=now-last; last=now; acc+=el;
  if(acc<STEP) return;
  acc=Math.min(acc-STEP,STEP);
  if(!state.paused){
    autopilot(STEP/1000);
    if(state.gravity){ const g=(state.grav/100)*GRAV; fluid.addUniform(gvx*g, gvy*g); }
    fluid.step(dtVal());
  }
  scanMax(); draw();
}

/* ===== 7. CONTROLS ===== */
const $=id=>document.getElementById(id);

/* build grouped <select> from a data map */
function fillSelect(sel, entries, order, cur){
  const byGroup={};
  for(const k in entries){ const g=entries[k].group||'other'; (byGroup[g]=byGroup[g]||[]).push(k); }
  const groups=order.filter(g=>byGroup[g]).concat(Object.keys(byGroup).filter(g=>order.indexOf(g)<0));
  sel.innerHTML='';
  for(const g of groups){
    const og=document.createElement('optgroup'); og.label=g;
    for(const k of byGroup[g]){ const o=document.createElement('option'); o.value=k; o.textContent=entries[k].name; og.appendChild(o); }
    sel.appendChild(og);
  }
  sel.value=cur;
}
function fillFlat(sel, entries, cur){
  sel.innerHTML='';
  for(const k in entries){ const o=document.createElement('option'); o.value=k; o.textContent=entries[k].name||entries[k]; sel.appendChild(o); }
  sel.value=cur;
}
fillSelect($('theme'), THEMES, ['signature','classic','retro computing','retro gaming','80s neon'], state.theme);
fillSelect($('ramp'), RAMPS, ['ascii','digits','symbols','blocks','script','kana','CJK'], state.ramp);
fillFlat($('font'), FONTS, state.font);
fillFlat($('brush'), BRUSHES, state.brush);

function bindSlider(id,key,fmt,after){
  const el=$(id),out=$(id+'V');
  const upd=()=>{ state[key]=+el.value; if(out)out.textContent=fmt?fmt(+el.value):el.value; if(after)after(); persist(); };
  el.addEventListener('input',upd); el.value=state[key]; upd();
}
bindSlider('speed','speed');
bindSlider('vort','vort');
bindSlider('visc','visc');
bindSlider('diff','diff');
bindSlider('fade','fade',v=>v+'%');
bindSlider('force','force');
bindSlider('grav','grav',v=>v+'%');
bindSlider('detail','detail',v=>v+'px',layout);
bindSlider('count','count');
// contrast slider drives gamma (stored 0.30..1.40)
(function(){
  const el=$('gamma'),out=$('gammaV');
  const upd=()=>{ state.gamma=(+el.value)/100; if(out)out.textContent=state.gamma.toFixed(2); persist(); };
  el.addEventListener('input',upd);
  el.value=Math.round(state.gamma*100); upd();
})();

$('field').value=state.field;
$('field').addEventListener('change',e=>{ state.field=e.target.value; updateSpinColorAvail(); rebuildColors(); persist(); });
$('theme').addEventListener('change',e=>{ state.theme=e.target.value; rebuildColors(); persist(); });
$('ramp').addEventListener('change',e=>{ state.ramp=e.target.value; persist(); });
$('font').addEventListener('change',e=>{ state.font=e.target.value; persist(); });
$('brush').addEventListener('change',e=>{ state.brush=e.target.value; persist(); });

// segmented spin-direction control
$('spinSeg').querySelectorAll('button').forEach(b=>{
  b.addEventListener('click',()=>{
    state.spinMode=b.dataset.spin;
    $('spinSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    persist();
  });
});
// reflect restored spinMode on boot (the segmented control's 'on' is otherwise hardcoded to 'auto')
$('spinSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.spin===state.spinMode));

function toggleBtn(id,key,after){
  const el=$(id);
  el.classList.toggle('on',state[key]);
  el.addEventListener('click',()=>{ state[key]=!state[key]; el.classList.toggle('on',state[key]); if(after)after(); persist(); });
}
toggleBtn('auto','auto');
toggleBtn('invert','invert');
toggleBtn('spinColor','spinColor',rebuildColors);
$('reseed2').addEventListener('click',reseed);

// randomize the whole look + reseed
$('randomize').addEventListener('click',()=>{
  const pick=o=>{const ks=Object.keys(o);return ks[Math.floor(Math.random()*ks.length)];};
  state.theme=pick(THEMES); state.ramp=pick(RAMPS); state.font=pick(FONTS); state.brush=pick(BRUSHES);
  $('theme').value=state.theme; $('ramp').value=state.ramp; $('font').value=state.font; $('brush').value=state.brush;
  rebuildColors(); reseed(); persist();
});

function updateSpinColorAvail(){
  $('spinColor').classList.toggle('disabled',state.field!=='vort');
}
updateSpinColorAvail();

// pause helper + quick action bar
function setPause(p){ state.paused=p; const b=$('qpause'); b.textContent=p?'тЦ╢':'тЭЪтЭЪ'; b.classList.toggle('on',p); }
function toggleFS(){
  const el=document.documentElement;
  if(!document.fullscreenElement){ (el.requestFullscreen||el.webkitRequestFullscreen||(()=>{})).call(el); }
  else { (document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document); }
}
document.querySelectorAll('#quick .qbtn[data-act]').forEach(b=>{
  b.addEventListener('click',()=>{
    switch(b.dataset.act){
      case 'pause': setPause(!state.paused); break;
      case 'reseed': reseed(); break;
      case 'clear': fluid.d.fill(0); runMax=1e-3; break;
      case 'gravity': setGravity(!state.gravity); break;
      case 'fs': toggleFS(); break;
    }
  });
});

// expand / collapse the sheet
const sheet=$('sheet');
function toggleSheet(){ sheet.classList.toggle('open'); $('chev').textContent=sheet.classList.contains('open')?'тЦ╛':'тЦ┤'; }
$('expand').addEventListener('click',toggleSheet);
$('grab').addEventListener('click',toggleSheet);

// fleeting hint
let hintTimer=setTimeout(dismissHint,3800);
function dismissHint(){ clearTimeout(hintTimer); const h=$('hint'); if(h) h.classList.add('gone'); }

// pause when backgrounded (battery)
let pausedByVis=false;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ if(!state.paused){ pausedByVis=true; setPause(true); } }
  else if(pausedByVis){ pausedByVis=false; setPause(false); last=performance.now(); }
});

// resize / rotate
let rzT;
function onResize(){ clearTimeout(rzT); rzT=setTimeout(layout,140); }
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',onResize);

/* ===== 8. BOOT ===== */
if(!(savedState && typeof savedState==='object' && 'detail' in savedState)){
  state.detail=defaultCell(window.innerWidth,window.innerHeight);
}
$('detail').value=state.detail; $('detailV').textContent=state.detail+'px';
rebuildColors();
layout();
requestAnimationFrame(frame);
</script>
</body>
